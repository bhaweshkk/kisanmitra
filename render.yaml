services:
  - type: web
    name: kisanmitra
    env: node
    region: singapore        
    plan: free
    buildCommand: echo "No build step needed — zero dependencies!"
    startCommand: node server.js
    healthCheckPath: /api/health

    envVars:
   
      - key: PORT
        value: 10000

      - key: NODE_ENV
        value: production

      - key: GROQ_API_KEY
        sync: false        

      - key: AUTH_SECRET
        generateValue: true 

      - key: ADMIN_PASSWORD
        sync: false          

      - key: GEMINI_API_KEY
        sync: false
      - key: NEWSAPI_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
