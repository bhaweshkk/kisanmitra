<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KisanMitra Admin</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

/* Layout */
.layout { display:flex; min-height:100vh; }
.sidebar { width:220px; background:#1e293b; padding:20px 0; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; }
.main { flex:1; padding:28px; overflow-y:auto; }

/* Sidebar */
.brand { padding:0 20px 20px; border-bottom:1px solid #334155; }
.brand-icon { font-size:28px; }
.brand-name { font-size:15px; font-weight:700; color:#f1f5f9; margin-top:4px; }
.brand-sub { font-size:11px; color:#64748b; }
.nav { padding:16px 10px; flex:1; }
.nav-btn { width:100%; text-align:left; background:none; border:none; color:#94a3b8; padding:10px 14px; border-radius:8px; cursor:pointer; font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px; transition:all 0.15s; margin-bottom:2px; }
.nav-btn:hover { background:#334155; color:#f1f5f9; }
.nav-btn.active { background:linear-gradient(135deg,#065f46,#047857); color:#6ee7b7; }
.nav-icon { font-size:16px; width:20px; text-align:center; }
.sidebar-footer { padding:16px 20px; border-top:1px solid #334155; }
.server-status { display:flex; align-items:center; gap:8px; font-size:12px; color:#64748b; }
.status-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:pulse 2s infinite; }

/* Cards */
.stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; margin-bottom:28px; }
.stat-card { background:#1e293b; border-radius:14px; padding:20px; border:1px solid #334155; }
.stat-label { font-size:12px; color:#64748b; font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
.stat-value { font-size:32px; font-weight:800; margin:6px 0 2px; }
.stat-sub { font-size:12px; color:#64748b; }
.stat-green { color:#34d399; }
.stat-blue  { color:#60a5fa; }
.stat-yellow{ color:#fbbf24; }
.stat-red   { color:#f87171; }

/* Panel */
.panel { background:#1e293b; border-radius:14px; border:1px solid #334155; overflow:hidden; margin-bottom:20px; }
.panel-header { padding:16px 20px; border-bottom:1px solid #334155; display:flex; align-items:center; justify-content:space-between; }
.panel-title { font-size:14px; font-weight:700; color:#f1f5f9; }
.panel-body { padding:20px; }

/* Table */
table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; padding:10px 12px; color:#64748b; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid #334155; }
td { padding:11px 12px; border-bottom:1px solid #1e293b; color:#cbd5e1; }
tr:last-child td { border:none; }
tr:hover td { background:#0f172a; }
.empty { text-align:center; color:#475569; padding:32px; font-size:13px; }

/* Log viewer */
.log-box { background:#0f172a; border-radius:8px; padding:14px; font-family:monospace; font-size:12px; line-height:1.7; max-height:340px; overflow-y:auto; border:1px solid #334155; }
.log-INFO  { color:#34d399; }
.log-WARN  { color:#fbbf24; }
.log-ERROR { color:#f87171; }
.log-ts    { color:#475569; }

/* Badges */
.badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-green { background:#064e3b; color:#34d399; }
.badge-yellow{ background:#451a03; color:#fbbf24; }
.badge-red   { background:#450a0a; color:#f87171; }
.badge-blue  { background:#0c1a4a; color:#60a5fa; }

/* Buttons */
.btn { padding:7px 14px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn-green { background:#065f46; color:#6ee7b7; }
.btn-green:hover { background:#047857; }
.btn-red { background:#450a0a; color:#fca5a5; }
.btn-red:hover { background:#7f1d1d; }
.btn-slate { background:#334155; color:#cbd5e1; }
.btn-slate:hover { background:#475569; }

/* Page header */
.page-header { margin-bottom:24px; }
.page-title { font-size:22px; font-weight:800; color:#f1f5f9; }
.page-sub { font-size:13px; color:#64748b; margin-top:4px; }

/* Progress bar */
.progress { background:#334155; border-radius:4px; height:6px; overflow:hidden; margin-top:8px; }
.progress-bar { height:100%; border-radius:4px; background:linear-gradient(90deg,#10b981,#34d399); transition:width 0.5s; }

/* Alerts */
.alert { padding:12px 16px; border-radius:8px; font-size:13px; margin-bottom:16px; }
.alert-info { background:#0c1a4a; border:1px solid #1d4ed8; color:#93c5fd; }

/* Uptime chart placeholder */
.sparkline { display:flex; align-items:flex-end; gap:2px; height:40px; }
.spark-bar { flex:1; background:#334155; border-radius:2px; min-height:4px; transition:background 0.2s; }
.spark-bar.active { background:#34d399; }

/* Chat log entry */
.chat-entry { background:#0f172a; border-radius:8px; padding:12px; margin-bottom:10px; }
.chat-meta { font-size:11px; color:#475569; margin-bottom:6px; }
.chat-q { color:#93c5fd; font-size:13px; margin-bottom:4px; }
.chat-a { color:#94a3b8; font-size:12px; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes spin { to{transform:rotate(360deg)} }
.spin { animation:spin 1s linear infinite; display:inline-block; }

/* Responsive */
@media(max-width:768px) { .sidebar{display:none} .stats-grid{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-icon">🌾</div>
      <div class="brand-name">KisanMitra Admin</div>
      <div class="brand-sub">Server Control Panel</div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" onclick="showPage('dashboard')" id="nav-dashboard">
        <span class="nav-icon">📊</span> Dashboard
      </button>
      <button class="nav-btn" onclick="showPage('contacts')" id="nav-contacts">
        <span class="nav-icon">📋</span> Contacts
      </button>
      <button class="nav-btn" onclick="showPage('chatlogs')" id="nav-chatlogs">
        <span class="nav-icon">💬</span> Chat Logs
      </button>
      <button class="nav-btn" onclick="showPage('logs')" id="nav-logs">
        <span class="nav-icon">📄</span> Server Logs
      </button>
      <button class="nav-btn" onclick="showPage('plugins')" id="nav-plugins">
        <span class="nav-icon">🔌</span> Plugins
      </button>
      <button class="nav-btn" onclick="showPage('settings')" id="nav-settings">
        <span class="nav-icon">⚙️</span> Settings
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="server-status">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Checking...</span>
      </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main" id="main-content">
    <!-- Pages rendered by JS -->
  </div>
</div>

<script>
const API = '';   // same origin
let healthData = null;
let currentPage = 'dashboard';

// ── Nav ──────────────────────────────────────
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  renderPage(page);
}

// ── API calls ─────────────────────────────────
async function apiFetch(path) {
  try {
    const r = await fetch(API + path);
    return await r.json();
  } catch (e) { return null; }
}

// ── Health poller ─────────────────────────────
async function pollHealth() {
  const data = await apiFetch('/api/health');
  healthData = data;
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  if (data && data.status === 'ok') {
    dot.style.background  = '#22c55e';
    text.textContent = 'Online';
  } else {
    dot.style.background  = '#ef4444';
    text.textContent = 'Offline';
  }
  if (currentPage === 'dashboard') renderPage('dashboard');
}

// ── Pages ─────────────────────────────────────
function renderPage(page) {
  const el = document.getElementById('main-content');
  if (page === 'dashboard') el.innerHTML = pageDashboard();
  else if (page === 'contacts') renderContacts(el);
  else if (page === 'chatlogs') renderChatlogs(el);
  else if (page === 'logs') renderLogs(el);
  else if (page === 'plugins') renderPlugins(el);
  else if (page === 'settings') el.innerHTML = pageSettings();
}

// ── Dashboard ─────────────────────────────────
function pageDashboard() {
  const h = healthData;
  const uptime = h ? formatUptime(h.uptime) : '—';
  const mem    = h ? Math.round(h.memory.heapUsed / 1024 / 1024) : 0;
  const memTot = h ? Math.round(h.memory.heapTotal / 1024 / 1024) : 1;
  const memPct = h ? Math.round((mem / memTot) * 100) : 0;
  const apiKey = h ? h.apiKeyConfigured : false;
  const contacts = h?.db?.contacts || 0;
  const chats    = h?.db?.chatlogs || 0;

  const sparks = Array.from({length:20}, (_,i) =>
    `<div class="spark-bar ${i > 14 ? 'active' : ''}" style="height:${20+Math.random()*20}px"></div>`
  ).join('');

  return `
  <div class="page-header">
    <div class="page-title">📊 Dashboard</div>
    <div class="page-sub">Real-time overview — auto-refreshes every 10s</div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Uptime</div>
      <div class="stat-value stat-green">${uptime}</div>
      <div class="stat-sub">Since last restart</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Memory Usage</div>
      <div class="stat-value stat-blue">${mem} <span style="font-size:18px">MB</span></div>
      <div class="progress"><div class="progress-bar" style="width:${memPct}%"></div></div>
      <div class="stat-sub" style="margin-top:6px">${memPct}% of ${memTot} MB heap</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Contacts Received</div>
      <div class="stat-value stat-yellow">${contacts}</div>
      <div class="stat-sub">Total form submissions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Claude API</div>
      <div class="stat-value" style="font-size:20px;margin-top:10px">${apiKey ? '<span class="badge badge-green">✅ Active</span>' : '<span class="badge badge-red">❌ No Key</span>'}</div>
      <div class="stat-sub" style="margin-top:8px">${apiKey ? 'Chat enabled' : 'Add key to .env'}</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">📈 Request Activity (last 20s)</div>
      <button class="btn btn-sm btn-slate" onclick="pollHealth()">↻ Refresh</button>
    </div>
    <div class="panel-body">
      <div class="sparkline">${sparks}</div>
      <div style="font-size:11px;color:#475569;margin-top:8px">Simulated — live metrics in logs</div>
    </div>
  </div>

  <div class="panel">
    <div class="panel-header"><div class="panel-title">🌐 API Endpoints</div></div>
    <div class="panel-body" style="padding:0">
      <table>
        <tr><th>Method</th><th>Path</th><th>Description</th><th>Cache</th></tr>
        <tr><td><span class="badge badge-green">GET</span></td><td>/api/health</td><td>Server diagnostics</td><td>—</td></tr>
        <tr><td><span class="badge badge-blue">POST</span></td><td>/api/chat</td><td>Claude AI proxy</td><td>—</td></tr>
        <tr><td><span class="badge badge-green">GET</span></td><td>/api/weather</td><td>Open-Meteo weather</td><td>10 min</td></tr>
        <tr><td><span class="badge badge-green">GET</span></td><td>/api/mandi</td><td>Mandi crop prices</td><td>30 min</td></tr>
        <tr><td><span class="badge badge-green">GET</span></td><td>/api/news</td><td>Agriculture news</td><td>15 min</td></tr>
        <tr><td><span class="badge badge-blue">POST</span></td><td>/api/contact</td><td>Contact form</td><td>—</td></tr>
        <tr><td><span class="badge badge-green">GET</span></td><td>/admin</td><td>This dashboard</td><td>—</td></tr>
      </table>
    </div>
  </div>`;
}

// ── Contacts ──────────────────────────────────
async function renderContacts(el) {
  el.innerHTML = `<div class="page-header"><div class="page-title">📋 Contacts</div><div class="page-sub">Form submissions from farmers</div></div><div class="panel"><div class="panel-body"><div class="empty"><span class="spin">⏳</span> Loading...</div></div></div>`;

  const data = await apiFetch('/api/admin/contacts');
  if (!data) { el.querySelector('.empty').textContent = '❌ Could not load contacts'; return; }

  const rows = data.length
    ? data.map(c => `
      <tr>
        <td>${c.name || '—'}</td>
        <td>${c.phone || '—'}</td>
        <td style="max-width:280px;word-break:break-word">${c.message || '—'}</td>
        <td><span style="font-size:11px;color:#475569">${new Date(c.createdAt).toLocaleString('en-IN')}</span></td>
      </tr>`).join('')
    : '<tr><td colspan="4" class="empty">No contacts yet</td></tr>';

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">📋 Contacts</div>
      <div class="page-sub">${data.length} total submissions</div>
    </div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">All Contacts</div>
        <button class="btn btn-sm btn-green" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
      <div class="panel-body" style="padding:0">
        <table>
          <tr><th>Name</th><th>Phone</th><th>Message</th><th>Date</th></tr>
          ${rows}
        </table>
      </div>
    </div>`;

  window._contactsData = data;
}

function exportCSV() {
  if (!window._contactsData) return;
  const rows = [['Name','Phone','Message','Date'],...window._contactsData.map(c => [c.name,c.phone,c.message,c.createdAt])];
  const csv  = rows.map(r => r.map(v => `"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a    = document.createElement('a');
  a.href     = 'data:text/csv,' + encodeURIComponent(csv);
  a.download = 'kisanmitra-contacts.csv';
  a.click();
}

// ── Chat Logs ─────────────────────────────────
async function renderChatlogs(el) {
  el.innerHTML = `<div class="page-header"><div class="page-title">💬 Chat Logs</div></div><div class="panel"><div class="panel-body"><div class="empty"><span class="spin">⏳</span> Loading...</div></div></div>`;
  const data = await apiFetch('/api/admin/chatlogs');
  if (!data) { return; }

  const entries = data.length
    ? data.slice().reverse().map(c => `
        <div class="chat-entry">
          <div class="chat-meta">🕐 ${new Date(c.createdAt).toLocaleString('en-IN')} &nbsp;|&nbsp; IP: ${c.ip || '—'}</div>
          <div class="chat-q">👤 ${c.userMessage || '—'}</div>
          <div class="chat-a">🤖 ${(c.botResponse || '—').slice(0,200)}${c.botResponse && c.botResponse.length > 200 ? '…' : ''}</div>
        </div>`)
      .join('')
    : '<div class="empty">No chat logs yet</div>';

  el.innerHTML = `
    <div class="page-header"><div class="page-title">💬 Chat Logs</div><div class="page-sub">${data.length} conversations logged</div></div>
    <div class="panel">
      <div class="panel-header"><div class="panel-title">Recent Conversations</div></div>
      <div class="panel-body">${entries}</div>
    </div>`;
}

// ── Server Logs ───────────────────────────────
async function renderLogs(el) {
  el.innerHTML = `<div class="page-header"><div class="page-title">📄 Server Logs</div></div><div class="panel"><div class="panel-body"><div class="empty"><span class="spin">⏳</span> Loading...</div></div></div>`;
  const data = await apiFetch('/api/admin/logs');
  if (!data) { return; }

  const lines = (data.lines || []).map(line => {
    const level = line.includes('[INFO]') ? 'INFO' : line.includes('[WARN]') ? 'WARN' : line.includes('[ERROR]') ? 'ERROR' : '';
    const ts = (line.match(/\[([\d\-T:.Z]+)\]/) || [])[1] || '';
    const msg = line.replace(/\[[\d\-T:.Z]+\]\s*/, '').replace(/\[INFO\]|\[WARN\]|\[ERROR\]/, '').trim();
    return `<div><span class="log-ts">${ts}</span> <span class="log-${level}">[${level}]</span> ${msg}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="page-header"><div class="page-title">📄 Server Logs</div><div class="page-sub">Last ${data.lines?.length || 0} lines of server.log</div></div>
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">server.log</div>
        <button class="btn btn-sm btn-slate" onclick="renderLogs(document.getElementById('main-content'))">↻ Refresh</button>
      </div>
      <div class="panel-body"><div class="log-box" id="logbox">${lines || '<span style="color:#475569">No logs yet</span>'}</div></div>
    </div>`;

  // Scroll to bottom
  const lb = document.getElementById('logbox');
  if (lb) lb.scrollTop = lb.scrollHeight;
}

// ── Plugins ───────────────────────────────────
async function renderPlugins(el) {
  el.innerHTML = `
    <div class="page-header"><div class="page-title">🔌 API Plugins</div><div class="page-sub">Loading...</div></div>
    <div class="panel"><div class="panel-body"><div class="empty"><span class="spin">⏳</span> Fetching plugin list...</div></div></div>`;

  const data = await apiFetch('/api/plugins');
  if (!data) { el.querySelector('.empty').textContent = '❌ Could not load plugins'; return; }

  const statusBadge = (p) => p.enabled
    ? '<span class="badge badge-green">● Enabled</span>'
    : '<span class="badge" style="background:#1e293b;color:#64748b">○ Disabled</span>';

  const methodBadge = (m) => m === 'POST'
    ? '<span class="badge badge-blue">POST</span>'
    : '<span class="badge badge-green">GET</span>';

  const cards = data.plugins.map(p => `
    <div class="panel" style="margin-bottom:14px">
      <div class="panel-header" style="flex-wrap:wrap;gap:8px">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          ${statusBadge(p)}
          ${methodBadge(p.method)}
          <span class="panel-title" style="font-size:15px">${p.name}</span>
          ${p.cached ? `<span class="badge badge-yellow">⚡ Cache ${p.cacheTTL}</span>` : ''}
          ${p.requiresKey ? `<span class="badge badge-red">🔑 Key: ${p.keyVar}</span>` : '<span class="badge badge-green">🔓 No Key</span>'}
        </div>
      </div>
      <div class="panel-body" style="padding:14px 20px">
        <div style="color:#94a3b8;font-size:13px;margin-bottom:10px">${p.description}</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <code style="background:#0f172a;color:#6ee7b7;padding:5px 12px;border-radius:6px;font-size:12px;border:1px solid #334155">${p.route}</code>
          ${p.params.length ? `<span style="font-size:12px;color:#64748b">Params: <code style="color:#fbbf24">${p.params.join(', ')}</code></span>` : ''}
          ${p.enabled ? `<button class="btn btn-sm btn-slate" onclick="testPlugin('${p.name}','${p.method}')">▶ Test</button>` : ''}
        </div>
      </div>
    </div>`).join('');

  el.innerHTML = `
    <div class="page-header">
      <div class="page-title">🔌 API Plugins</div>
      <div class="page-sub">${data.total} plugins in apis.config.json — edit the file to add/enable/disable</div>
    </div>

    <div class="alert alert-info" style="margin-bottom:20px">
      💡 To add a new API: open <strong>apis.config.json</strong>, copy the <code>custom-example</code> block,
      fill in your API details, set <code>"enabled": true</code>. The server hot-reloads — no restart needed!
    </div>

    <div id="plugin-test-result"></div>
    ${cards}`;
}

async function testPlugin(name, method) {
  const el = document.getElementById('plugin-test-result');
  el.innerHTML = `<div class="panel" style="margin-bottom:16px;border-color:#334155"><div class="panel-body"><div class="empty"><span class="spin">⏳</span> Testing <strong>${name}</strong>...</div></div></div>`;

  const testParams = {
    weather: '?latitude=26.9124&longitude=75.7873',
    geocode: '?q=Jaipur',
    mandi:   '?state=Rajasthan',
  };

  const qs = testParams[name] || '';
  const url = `/api/plugins/${name}${qs}`;

  try {
    const r = await fetch(url, method === 'POST' ? {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ messages: [{ role: 'user', content: 'Say hello in 5 words.' }] })
    } : {});
    const json = await r.json();
    const pretty = JSON.stringify(json, null, 2).slice(0, 800);
    el.innerHTML = `
      <div class="panel" style="margin-bottom:16px;border-color:${r.ok?'#065f46':'#7f1d1d'}">
        <div class="panel-header">
          <div class="panel-title">${r.ok ? '✅' : '❌'} Test: ${name} — HTTP ${r.status}</div>
          <button class="btn btn-sm btn-slate" onclick="document.getElementById('plugin-test-result').innerHTML=''">✕</button>
        </div>
        <div class="panel-body"><div class="log-box" style="max-height:200px">${pretty}${json && JSON.stringify(json).length > 800 ? '\n… (truncated)' : ''}</div></div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div class="panel" style="margin-bottom:16px;border-color:#7f1d1d"><div class="panel-body"><span style="color:#f87171">❌ ${e.message}</span></div></div>`;
  }
}

// ── Settings ──────────────────────────────────
function pageSettings() {
  return `
  <div class="page-header"><div class="page-title">⚙️ Settings</div><div class="page-sub">Server configuration reference</div></div>
  <div class="alert alert-info">ℹ️ Edit the <strong>.env</strong> file in your server folder to change these settings, then restart the server.</div>
  <div class="panel">
    <div class="panel-header"><div class="panel-title">Environment Variables</div></div>
    <div class="panel-body" style="padding:0">
      <table>
        <tr><th>Variable</th><th>Default</th><th>Description</th></tr>

function formatUptime(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}
